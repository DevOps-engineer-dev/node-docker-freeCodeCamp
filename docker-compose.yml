services:
  node-app:
    build: .
    image: malwarecube/node-application
    environment:
      - PORT=3000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

  nginx: # <-- NEW SERVICE
    image: nginx:stable-alpine
    ports:
      - "80:80" # Map localhost:3000 to Nginx's port 80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - node-app

  mongo:
    image: mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.runCommand({ ping: 1 })",
          "mongodb://root:example@localhost:27017/admin?authSource=admin",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis

volumes:
  mongo-data:
